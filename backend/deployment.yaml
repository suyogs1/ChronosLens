apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: chronos-lens-backend
  labels:
    cloud.googleapis.com/location: us-central1
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/sessionAffinity: "true" # Required for WebSockets
    spec:
      containers:
      - image: gcr.io/PROJECT_ID/chronos-lens-backend:latest
        ports:
        - name: http1
          containerPort: 8000
        env:
        - name: GEMINI_API_KEY
          valueSecret:
            name: gemini-api-key
            key: latest
      timeoutSeconds: 300 # Live streaming sessions can be long
